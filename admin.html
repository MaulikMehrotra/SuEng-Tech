<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card {
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}
</style>
</head>
<body>

<h2>Supplier Dashboard</h2>
<div id="data"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBLsFgjA2EDVCw1TZFejwY3mOzu5aIDpF4",
  authDomain: "sueng-tech-d854e.firebaseapp.com",
  projectId: "sueng-tech-d854e",
  storageBucket: "sueng-tech-d854e.appspot.com",
  messagingSenderId: "868647762893",
  appId: "1:868647762893:web:d1e5259263567bab7ca284"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("data");

async function loadData() {
    const querySnapshot = await getDocs(collection(db, "selections"));

    querySnapshot.forEach(doc => {
        const d = doc.data();

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>User:</b> ${d.userEmail} <br>
            <b>Technology:</b> ${d.technology} <br>
            <b>Manufacturer:</b> ${d.manufacturer} <br>
            <b>Module:</b> ${d.moduleCapacity} kWp <br>
            <b>Status:</b> ${d.status}
        `;

        container.appendChild(div);
    });
}

loadData();
</script>

</body>
</html>
