<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuEng Tech - Secure Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .auth-container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 450px; overflow: hidden; }
        .auth-header { background: linear-gradient(135deg, #155724 0%, #38ef7d 100%); padding: 40px 30px; text-align: center; color: white; }
        .auth-body { padding: 40px 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
        }
        .submit-btn { 
            width: 100%; 
            padding: 14px; 
            background: #11998e; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
        }
        .hidden { 
        display: none !important; 
        }
        .error-message { 
            color: #dc3545; 
            background: #f8d7da; 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 15px; 
            display: none; 
            font-size: 13px; 
        }
        .dashboard { 
        display: none; 
        background: white; 
        border-radius: 20px; 
        width: 100%; 
        max-width: 800px; 
        padding: 40px; 
        }
        .dashboard.show { 
        display: block; 
        }
        
        #blok {
        background:#f9f9f9;
        padding:20px; 
        border-radius:10px; 
        margin-top:10px; 
        cursor:pointer;
        transition: all 0.3s ease;
        }

        #blok:hover{ 
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transform: translateY(-5px);
            }
    </style>
    
</head>
<body>

    <div class="auth-container" id="authWrapper">
        <div id="loginForm">
            <div class="auth-header"><h1>SuEng Tech</h1><p>Login to access solutions</p></div>
            <div class="auth-body">
                <div class="error-message" id="loginError"></div>
                <form id="formLogin">
                    <div class="form-group"><label>Email</label><input type="email" id="loginEmail" required></div>
                    <div class="form-group"><label>Password</label><div style="position:relative;">
    <input type="password" id="loginPassword" required style="padding-right:40px;"><span onclick="togglePasswordIcon('loginPassword', this)" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">👁️</span></div></div>
                    <p style="text-align:center; margin:10px 0px 10px 5px;"><a href="#" onclick="forgotPassword()">Forgot Password?</a></p>
                    <button type="submit" class="submit-btn">Login</button>
                </form>
                <p style="text-align:center; margin-top:15px;">New? <a href="#" onclick="toggleAuth(true)">Sign Up</a></p>
            </div>
        </div>

        <div id="signupForm" class="hidden">
            <div class="auth-header"><h1>Create Account</h1><p>Join the platform</p></div>
            <div class="auth-body">
                <div class="error-message" id="signupError"></div>
                <form id="formSignup">
                    <div class="form-group"><label>Full Name</label><input type="text" id="signupName" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="signupEmail" required></div>
                    <div class="form-group"><label>Password</label><div style="position:relative;">
    <input type="password" id="loginPassword" required style="padding-right:40px;"><span onclick="togglePasswordIcon('loginPassword', this)" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">👁️</span></div></div>
                    <button type="submit" class="submit-btn">Create Account</button>
                </form>
                <p style="text-align:center; margin-top:15px;">Have an account? <a href="#" onclick="toggleAuth(false)">Login</a></p>
            </div>
        </div>
    </div>

    <div class="dashboard" id="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #eee; padding-bottom:15px;">
            <h2>Welcome, <span id="userName">User</span>!</h2>
            <button onclick="handleLogout()" style="background:#dc3545; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Logout</button>
        </div>
        <div style="margin-top:20px;">
            <h3>Your Solutions</h3>
            <div  id="blok" onclick="location.href='drops.html'">
                <h4>Solar PV Module Selector</h4>
                <p>Configure and save your solar hardware preferences.</p>
            </div>
        </div>
    </div>
    <script>
    function togglePasswordIcon(id, el) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            el.textContent = "🙈";
        } else {
            input.type = "password";
            el.textContent = "👁️";
        }
    }

    function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
    }
</script>
    <script type="module">
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
        const firebaseConfig = {
        apiKey: "AIzaSyBLsFgjA2EDVCw1TZFejwY3mOzu5aIDpF4",
        authDomain: "sueng-tech-d854e.firebaseapp.com",
        projectId: "sueng-tech-d854e",
        storageBucket: "sueng-tech-d854e.appspot.com",
        messagingSenderId: "868647762893",
        appId: "1:868647762893:web:d1e5259263567bab7ca284",
        measurementId: "G-YCKWDMQGXE"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        // UI Toggles
        window.toggleAuth = (showSignup) => {
            document.getElementById('loginForm').classList.toggle('hidden', showSignup);
            document.getElementById('signupForm').classList.toggle('hidden', !showSignup);
        };

        // Signup Logic
        document.getElementById('formSignup').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);

                // 🔥 update login count
                await updateDoc(doc(db, "users", cred.user.uid), {
                totalLogins: increment(1)
                });

                // Update display name
                await updateProfile(cred.user, { displayName: name });

                // 🔥 Save user in Firestore
                await setDoc(doc(db, "users", cred.user.uid), {
                    name: name,
                    email: email,
                    createdAt: new Date(),
                    totalLogins: 0
                });

                location.reload();
            } catch (err) {
                const errEl = document.getElementById('signupError');
                errEl.textContent = err.message; errEl.style.display = 'block';
            }
        });

        // Login Logic
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const cred = await signInWithEmailAndPassword(auth, email, password);
                await updateDoc(doc(db, "users", cred.user.uid), {
            totalLogins: increment(1)
            });
            } catch (err) {
                const errEl = document.getElementById('loginError');
                errEl.textContent = "Invalid credentials"; errEl.style.display = 'block';
            }
        });
      

        // Auth Observer
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authWrapper').classList.add('hidden');
                document.getElementById('dashboard').classList.add('show');
                document.getElementById('userName').textContent = user.displayName;
            } else {
                document.getElementById('authWrapper').classList.remove('hidden');
                document.getElementById('dashboard').classList.remove('show');
            }
        });
        function togglePassword(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
        }
        window.handleLogout = () => signOut(auth);
    </script>
</body>
</html>
